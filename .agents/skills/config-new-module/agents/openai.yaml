interface:
  display_name: 'Config New Module'
  short_description: 'Criar módulo full-stack (package + backend + frontend)'
  default_prompt: 'Crie um novo módulo com node .claude/skills/config-new-module/scripts/create-module.mjs gerando pacote de dominio em modules/<module>, módulo backend com provider Prisma e modelo Prisma, módulo frontend com dashboard/menu e rota em app/(private), criando componentes em `apps/frontend/src/modules/<module>/components` e `layout.tsx` do módulo em `app/(private)/<module>` para decidir localmente o menu do módulo usando `PrivateAppShell` (de `apps/frontend/src/modules/auth/components/private-app-shell.component.tsx`), com componente compartilhado de padronização em `shared/navigation/module-sidebar-menu.component.tsx`, menu padrão (Voltar, separador, label do módulo e `Visão Geral <Nome do Módulo>`), garantindo labels dos menus com acentuação correta em PT-BR quando aplicável, `EmptyDashboardState` como padrão de dashboard quando disponível e `moduleName` opcional para o título do dashboard, sincronize a dependência <scope>/<modulo> em apps/backend/package.json e apps/frontend/package.json, atualize o menu principal em `apps/frontend/src/app/(private)/dashboard/layout.tsx` com item navegável e ícone determinístico, e ao final aplique ordenação semântica determinística por frequência de uso com módulos administrativos no bloco inferior.'
